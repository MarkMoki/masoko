<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#14532d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="maSoKo" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
    <title>maSoKo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f0fdf4;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #14532d;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
        padding-top: env(safe-area-inset-top, 2rem);
        padding-bottom: env(safe-area-inset-bottom, 2rem);
      }
      .launch-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        animation: fadeIn 0.4s ease-out;
      }
      .launch-icon {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: linear-gradient(135deg, #14532d 0%, #15803d 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(20, 83, 45, 0.3);
        animation: scaleIn 0.5s ease-out;
      }
      .launch-icon svg {
        width: 44px;
        height: 44px;
        color: white;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #14532d;
      }
      p {
        font-size: 0.9rem;
        line-height: 1.5;
        color: #6b7280;
        max-width: 280px;
      }
      code {
        background: rgba(20, 83, 45, 0.08);
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        font-size: 0.8rem;
        font-family: 'SF Mono', Monaco, monospace;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div class="launch-screen">
      <div class="launch-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="21" r="1" />
          <circle cx="19" cy="21" r="1" />
          <path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12" />
        </svg>
      </div>
      <div>
        <h1>maSoKo</h1>
        <p>Loading your marketplace experience...</p>
      </div>
    </div>
    <script>
      if (window.Capacitor) {
        window.Capacitor.Plugins.StatusBar?.setStyle({ style: 'DARK' });
        window.Capacitor.Plugins.StatusBar?.setBackgroundColor({ color: '#14532d' });
      }
    </script>
  </body>
</html>
